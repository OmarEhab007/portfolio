<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#39ff14;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00ff41;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#39ff14;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle with glow -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="url(#neonGradient)" stroke-width="4" filter="url(#glow)" opacity="0.8"/>
  
  <!-- Main O letter -->
  <path d="M 32 12 Q 20 12 20 32 Q 20 52 32 52 Q 44 52 44 32 Q 44 12 32 12" 
        fill="none" 
        stroke="url(#neonGradient)" 
        stroke-width="5" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#glow)"/>
  
  <!-- Inner glow effect -->
  <circle cx="32" cy="32" r="18" fill="none" stroke="#39ff14" stroke-width="1" opacity="0.3"/>
</svg>
